<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Apply for a role at KWND Creative">
    <meta name="keywords" content="Apply, Job Application, Front-End Developer, Designer, Creative Agency, KWND Creative">
    <meta name="author" content="G06">
    <title>Apply | KWND Creative</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Join KWND Creative</h1>

        <nav>
            <a id="navBar" href="index.html">Home</a>
            <a id="navBar" href="about.html">About</a>
            <a id="navBar" href="jobs.html">Jobs</a>
            <a id="navBar" href="apply.html">Join Us</a>
        </nav>
    </header>

    <main>
        <h2>Job Application Form</h2>
        <p>Please complete all required fields below to apply for a position with KWND Creative.</p>

        <form action="https://mercury.swin.edu.au/it000000/formtest.php" method="post" novalidate="novalidate">
            
            <p>
                <label for="jobRef">Job Reference Number:</label><br>
                <input type="text" id="jobRef" name="jobRef" required
                    pattern="[A-Za-z0-9]{5}"
                    maxlength="5"
                    size="20"
                    title="Exactly 5 alphanumeric characters">
            </p>

            <p>
                <label for="firstName">First Name:</label><br>
                <input type="text" id="firstName" name="firstName" required
                    pattern="[A-Za-z]{1,20}"
                    maxlength="20"
                    size="20"
                    title="Maximum 20 alphabetic characters only">
            </p>

            <p>
                <label for="lastName">Last Name:</label><br>
                <input type="text" id="lastName" name="lastName" required
                    pattern="[A-Za-z]{1,20}"
                    maxlength="20"
                    size="20"
                    title="Maximum 20 alphabetic characters only">
            </p>

            <p>
                <label for="dob">Date of Birth:</label><br>
                <input type="text" id="dob" name="dob" required
                    pattern="(0[1-9]|[12][0-9]|3[01])/(0[1-9]|1[0-2])/[0-9]{4}"
                    placeholder="dd/mm/yyyy"
                    size="20"
                    title="Format must be dd/mm/yyyy">
            </p>

            <fieldset>
                <legend>Gender</legend>
                <p>
                    <input type="radio" id="male" name="gender" value="Male" required>
                    <label for="male">Male</label>

                    <input type="radio" id="female" name="gender" value="Female">
                    <label for="female">Female</label>

                    <input type="radio" id="other" name="gender" value="Other">
                    <label for="other">Other</label>
                </p>
            </fieldset>

            <p>
                <label for="streetAddress">Street Address:</label><br>
                <input type="text" id="streetAddress" name="streetAddress" required
                    maxlength="40"
                    size="40"
                    title="Maximum 40 characters">
            </p>

            <p>
                <label for="suburbTown">Suburb/Town:</label><br>
                <input type="text" id="suburbTown" name="suburbTown" required
                    maxlength="40"
                    size="40"
                    title="Maximum 40 characters">
            </p>

            <p>
                <label for="state">State:</label><br>
                <select id="state" name="state" required>
                    <option value="">Please Select</option>
                    <option value="VIC">VIC</option>
                    <option value="NSW">NSW</option>
                    <option value="QLD">QLD</option>
                    <option value="NT">NT</option>
                    <option value="WA">WA</option>
                    <option value="SA">SA</option>
                    <option value="TAS">TAS</option>
                    <option value="ACT">ACT</option>
                </select>
            </p>

            <p>
                <label for="postcode">Postcode:</label><br>
                <input type="text" id="postcode" name="postcode" required
                    pattern="[0-9]{4}"
                    maxlength="4"
                    size="10"
                    title="Exactly 4 digits">
            </p>

            <p>
                <label for="email">Email:</label><br>
                <input type="email" id="email" name="email" required size="30">
            </p>

            <p>
                <label for="phone">Phone Number:</label><br>
                <input type="tel" id="phone" name="phone" required
                    pattern="[0-9]{8,12}"
                    maxlength="12"
                    size="20"
                    title="Phone number must be between 8 and 12 digits">
            </p>

            <fieldset>
                <legend>Skill List</legend>
                <p>
                    <input type="checkbox" id="html" name="skills[]" value="HTML" required>
                    <label for="html">HTML</label>
                </p>
                <p>
                    <input type="checkbox" id="css" name="skills[]" value="CSS">
                    <label for="css">CSS</label>
                </p>
                <p>
                    <input type="checkbox" id="javascript" name="skills[]" value="JavaScript">
                    <label for="javascript">JavaScript</label>
                </p>
                <p>
                    <input type="checkbox" id="figma" name="skills[]" value="Figma">
                    <label for="figma">Figma</label>
                </p>
                <p>
                    <input type="checkbox" id="branding" name="skills[]" value="Branding">
                    <label for="branding">Branding</label>
                </p>
                <p>
                    <input type="checkbox" id="contentCreation" name="skills[]" value="Content Creation">
                    <label for="contentCreation">Content Creation</label>
                </p>
            </fieldset>

            <p>
                <label for="otherSkills">Other Skills:</label><br>
                <textarea id="otherSkills" name="otherSkills" rows="6" cols="50" placeholder="Enter any other relevant skills here..."></textarea>
            </p>

            <p>
                <input type="submit" value="Apply">
                <input type="reset" value="Reset Form">
            </p>

        </form>
    </main>
</body>
</html>
